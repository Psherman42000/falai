<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FALAI — Configurações</title>
  <style>
    :root {
      --surface: #141923;
      --surface-elevated: #1c212e;
      --text-primary: rgba(255, 255, 255, 0.93);
      --text-secondary: rgba(255, 255, 255, 0.72);
      --text-muted: rgba(255, 255, 255, 0.52);
      --accent: #7c5cff;
      --accent-text: #cbb5ff;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    .sidebar {
      width: 180px;
      background: var(--surface-elevated);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 150ms ease;
    }

    .sidebar-item:hover, .sidebar-item.active {
      background: rgba(124, 92, 255, 0.15);
      color: var(--accent-text);
    }

    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    h1 { font-size: 18px; margin-bottom: 20px; font-weight: 600; }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field select, .field input {
      width: 100%;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .field select:focus, .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.15);
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 150ms ease;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-item active" data-section="general">Geral</div>
    <div class="sidebar-item" data-section="microphone">Microfone</div>
    <div class="sidebar-item" data-section="language-section">Idioma</div>
    <div class="sidebar-item" data-section="model">Modelo</div>
    <div class="sidebar-item" data-section="shortcuts">Atalhos</div>
    <div class="sidebar-item" data-section="about">Sobre</div>
  </aside>

  <main class="content">
    <h1>Configurações</h1>

    <section id="general">
      <div class="field">
        <label>Posição do notch</label>
        <select id="notchPosition">
          <option value="bottom-center">Inferior centro (padrão)</option>
          <option value="bottom-left">Inferior esquerda</option>
          <option value="bottom-right">Inferior direita</option>
          <option value="top-center">Topo centro</option>
          <option value="top-left">Topo esquerda</option>
          <option value="top-right">Topo direita</option>
        </select>
      </div>
    </section>

    <section id="microphone">
      <div class="field">
        <label>Microfone</label>
        <select id="micSelect"></select>
        <div class="hint" id="micHint">Selecione o dispositivo de entrada de áudio.</div>
      </div>
      <div class="field">
        <button class="primary" id="testMicBtn" style="padding:8px 16px;font-size:12px;">Testar microfone</button>
        <span id="testMicResult" style="margin-left:12px;font-size:12px;color:var(--text-muted);"></span>
      </div>
    </section>

    <section id="language-section">
      <div class="field">
        <label>Idioma da transcrição</label>
        <select id="langSelect">
          <option value="auto">Auto-detectar</option>
          <option value="pt">Português</option>
          <option value="en">Inglês</option>
          <option value="es">Espanhol</option>
          <option value="fr">Francês</option>
        </select>
        <div class="hint">"Auto" faz o Whisper detectar o idioma automaticamente.</div>
      </div>
    </section>

    <section id="model">
      <div class="field">
        <label>Modelo Whisper</label>
        <select id="whisperModel"></select>
        <div class="hint" id="whisperModelHint"></div>
      </div>

      <div class="field">
        <label>Formatação automática</label>
        <select id="formatText">
          <option value="true">Ativada — capitaliza, pontua, normaliza espaços</option>
          <option value="false">Desativada — texto cru do Whisper</option>
        </select>
        <div class="hint">Desative se preferir transcrição literal sem alterações.</div>
      </div>
    </section>

    <section id="shortcuts">
      <div class="field">
        <label>Atalho global</label>
        <input type="text" id="hotkey" value="Ctrl+Space" readonly>
        <div class="hint">Ainda não customizável nesta versão.</div>
      </div>
    </section>

    <section id="about">
      <div class="field">
        <label>Versão</label>
        <div style="color: var(--text-secondary); font-size: 13px;">1.2.0</div>
      </div>
    </section>

    <div class="actions">
      <button class="primary" id="save">Salvar</button>
      <button class="secondary" id="cancel">Cancelar</button>
    </div>
  </main>

  <script>
    const sections = document.querySelectorAll('section');
    const sidebarItems = document.querySelectorAll('.sidebar-item');
    const notchPosition = document.getElementById('notchPosition');
    const langSelect = document.getElementById('langSelect');
    const whisperModel = document.getElementById('whisperModel');
    const whisperModelHint = document.getElementById('whisperModelHint');
    const formatTextSelect = document.getElementById('formatText');
    const hotkey = document.getElementById('hotkey');
    const saveBtn = document.getElementById('save');
    const cancelBtn = document.getElementById('cancel');
    const micSelect = document.getElementById('micSelect');
    const micHint = document.getElementById('micHint');
    const testMicBtn = document.getElementById('testMicBtn');
    const testMicResult = document.getElementById('testMicResult');

    const WHISPER_MODELS = [
      { value: 'tiny',     hint: '39 MB, rápido, menos preciso' },
      { value: 'base',     hint: '74 MB, equilíbrio (padrão)' },
      { value: 'small',    hint: '244 MB, mais preciso' },
      { value: 'medium',   hint: '769 MB, melhor, mais lento' },
      { value: 'large',    hint: '1.5 GB, alta qualidade' },
      { value: 'large-v3', hint: '2.9 GB, melhor qualidade' },
    ];

    WHISPER_MODELS.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.value;
      opt.textContent = `${m.value} — ${m.hint}`;
      whisperModel.appendChild(opt);
    });

    whisperModel.addEventListener('change', () => {
      const selected = WHISPER_MODELS.find(m => m.value === whisperModel.value);
      whisperModelHint.textContent = selected?.hint || '';
    });

    sidebarItems.forEach(item => {
      item.addEventListener('click', () => {
        const id = item.dataset.section;
        sidebarItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        sections.forEach(s => s.style.display = s.id === id ? 'block' : 'none');
      });
    });

    sections.forEach(s => s.style.display = s.id === 'general' ? 'block' : 'none');

    async function loadMicrophones() {
      try {
        const devices = await window.falaiAPI.getAudioDevices();
        micSelect.innerHTML = '<option value="default">Padrão do Windows</option>';
        if (devices && devices.length > 0) {
          devices.forEach(d => {
            const opt = document.createElement('option');
            opt.value = String(d.index);
            opt.textContent = `${d.name} (${d.channels} canais, ${d.sr} Hz)`;
            micSelect.appendChild(opt);
          });
        }
        micHint.textContent = devices && devices.length > 0
          ? `${devices.length} dispositivos encontrados. Selecione qual microfone usar.`
          : 'Nenhum microfone detectado. Verifique se o driver de áudio está instalado.';
      } catch (err) {
        console.error('[settings] Erro ao listar mics:', err);
        micSelect.innerHTML = '<option value="default">Padrão do Windows</option>';
        micHint.textContent = 'Erro ao listar dispositivos.';
      }
    }

    testMicBtn.addEventListener('click', async () => {
      testMicResult.textContent = 'Gravando 1s...';
      testMicBtn.disabled = true;
      try {
        const device = micSelect.value;
        const devArg = device === 'default' ? '' : `,device=${device}`;
        const result = await window.falaiAPI.testMicrophone(devArg);
        if (result && result.ok) {
          testMicResult.textContent = `OK — ${result.samples} amostras, ${result.nonSilence} não-silêncio`;
          testMicResult.style.color = result.nonSilence > 10 ? 'var(--state-typing)' : 'var(--state-error)';
        } else {
          testMicResult.textContent = result?.error || 'Falha no teste';
          testMicResult.style.color = 'var(--state-error)';
        }
      } catch (err) {
        testMicResult.textContent = 'Erro: ' + err.message;
        testMicResult.style.color = 'var(--state-error)';
      }
      testMicBtn.disabled = false;
    });

    async function loadConfig() {
      try {
        const cfg = await window.falaiAPI.loadConfig();
        if (!cfg) return;

        notchPosition.value = cfg.notchPosition ?? 'bottom-center';
        langSelect.value = cfg.language ?? 'auto';
        if (cfg.whisperModel) {
          whisperModel.value = cfg.whisperModel;
          const selected = WHISPER_MODELS.find(m => m.value === cfg.whisperModel);
          whisperModelHint.textContent = selected?.hint || '';
        }
        formatTextSelect.value = cfg.formatText !== undefined ? String(cfg.formatText) : 'true';
        hotkey.value = cfg.hotkey ?? 'Ctrl+Space';
        if (cfg.microphoneDevice && cfg.microphoneDevice !== 'default') {
          micSelect.value = cfg.microphoneDevice;
        }
      } catch (err) {
        console.error('[settings] Erro ao carregar config:', err);
      }
    }

    saveBtn.addEventListener('click', async () => {
      try {
        await window.falaiAPI.saveConfig({
          notchPosition: notchPosition.value,
          language: langSelect.value,
          whisperModel: whisperModel.value,
          formatText: formatTextSelect.value === 'true',
          hotkey: hotkey.value,
          microphoneDevice: micSelect.value,
        });
        window.falaiAPI.closeWindow();
      } catch (err) {
        console.error('[settings] Erro ao salvar config:', err);
      }
    });

    cancelBtn.addEventListener('click', () => {
      window.falaiAPI.closeWindow();
    });

    loadMicrophones();
    loadConfig();
  </script>
</body>
</html>
