<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FALAI Notch</title>
  <style>
    :root {
      --surface: rgba(18, 20, 28, 0.92);
      --surface-glow: rgba(124, 92, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.65);
      --text-muted: rgba(255, 255, 255, 0.40);
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.35);
      --accent-text: #cbb5ff;
      --border: rgba(255, 255, 255, 0.10);
      --border-hover: rgba(255, 255, 255, 0.20);
      --state-listening: #ff4757;
      --state-listening-glow: rgba(255, 71, 87, 0.25);
      --state-processing: #f59e0b;
      --state-processing-glow: rgba(245, 158, 11, 0.25);
      --state-typing: #10e676;
      --state-typing-glow: rgba(16, 230, 118, 0.25);
      --state-error: #e74c3c;
      --state-idle: #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* ===== NOTCH CONTAINER ===== */
    #notch {
      position: relative;
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 8px 0 18px;
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      color: var(--text-primary);
      font-size: 13px;
      transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: default;
      box-shadow:
        0 2px 20px rgba(0, 0, 0, 0.35),
        0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
    }

    /* Glow ring on hover */
    #notch::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 23px;
      background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
      opacity: 0;
      transition: opacity 300ms ease;
      pointer-events: none;
      z-index: -1;
    }

    #notch:hover {
      border-color: var(--border-hover);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 0 20px var(--surface-glow);
    }

    #notch:hover::before {
      opacity: 1;
    }

    /* ===== STATE VARIANTS ===== */
    #notch.listening {
      background: rgba(18, 20, 28, 0.92);
      border-color: rgba(255, 71, 87, 0.30);
      box-shadow:
        0 2px 20px rgba(0, 0, 0, 0.35),
        0 0 24px var(--state-listening-glow);
    }

    #notch.processing {
      background: rgba(18, 20, 28, 0.92);
      border-color: rgba(245, 158, 11, 0.30);
      box-shadow:
        0 2px 20px rgba(0, 0, 0, 0.35),
        0 0 24px var(--state-processing-glow);
    }

    #notch.typing {
      background: rgba(18, 20, 28, 0.92);
      border-color: rgba(16, 230, 118, 0.30);
      box-shadow:
        0 2px 20px rgba(0, 0, 0, 0.35),
        0 0 24px var(--state-typing-glow);
    }

    #notch.error {
      background: rgba(18, 20, 28, 0.92);
      border-color: rgba(231, 76, 60, 0.40);
      box-shadow:
        0 2px 20px rgba(0, 0, 0, 0.35),
        0 0 20px rgba(231, 76, 60, 0.20);
    }

    /* ===== LEFT: BRAND ===== */
    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--state-idle);
      transition: all 300ms ease;
      flex-shrink: 0;
    }

    #notch.listening .brand-dot {
      background: var(--state-listening);
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    #notch.processing .brand-dot {
      background: var(--state-processing);
      animation: dot-blink 0.6s ease-in-out infinite;
    }
    #notch.typing .brand-dot {
      background: var(--state-typing);
    }
    #notch.error .brand-dot {
      background: var(--state-error);
    }

    .brand-text {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      transition: color 300ms ease;
      text-transform: uppercase;
    }

    #notch:hover .brand-text { color: var(--accent-text); }
    #notch.listening .brand-text { color: var(--text-primary); }
    #notch.typing .brand-text { color: var(--state-typing); }
    #notch.error .brand-text { color: var(--state-error); }

    /* ===== CENTER: STATUS ===== */
    .status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .status-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #notch.listening .status-label { color: var(--state-listening); }
    #notch.processing .status-label { color: var(--state-processing); }
    #notch.typing .status-label { color: var(--state-typing); }
    #notch.error .status-label { color: var(--state-error); }

    .status-timer {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      font-family: 'Cascadia Code', 'JetBrains Mono', monospace;
    }

    /* ===== WAVEFORM (listening state) ===== */
    .waveform {
      display: none;
      align-items: center;
      gap: 2px;
      height: 16px;
    }

    .waveform span {
      width: 2px;
      height: 4px;
      background: var(--state-listening);
      border-radius: 1px;
      animation: wave 0.8s ease-in-out infinite;
    }

    .waveform span:nth-child(2) { animation-delay: 0.1s; }
    .waveform span:nth-child(3) { animation-delay: 0.2s; }
    .waveform span:nth-child(4) { animation-delay: 0.3s; }
    .waveform span:nth-child(5) { animation-delay: 0.15s; }

    #notch.listening .waveform { display: flex; }
    #notch.listening .status-label { display: none; }

    /* ===== SPINNER (processing state) ===== */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(245, 158, 11, 0.2);
      border-top-color: var(--state-processing);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    #notch.processing .spinner { display: block; }

    /* ===== ACTIONS (appear on hover) ===== */
    .actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 10px;
      opacity: 0;
      transform: translateX(8px);
      transition: all 200ms ease;
      pointer-events: none;
    }

    #notch:hover .actions {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 150ms ease;
      font-size: 13px;
      line-height: 1;
    }

    .action-btn:hover {
      background: rgba(124, 92, 255, 0.20);
      color: var(--accent-text);
      transform: scale(1.1);
    }

    .action-btn.close:hover {
      background: rgba(231, 76, 60, 0.20);
      color: #ff6b6b;
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes dot-pulse {
      0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--state-listening-glow); }
      50% { transform: scale(1.3); opacity: 0.8; box-shadow: 0 0 8px 2px var(--state-listening-glow); }
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      #notch { transition: none; }
      .brand-dot, .waveform span, .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <div id="notch" class="idle">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-text">FALAI</div>
    </div>

    <!-- Status center -->
    <div class="status">
      <div class="waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="spinner"></div>
      <div class="status-label" id="statusLabel">Pronto</div>
      <div class="status-timer" id="statusTimer"></div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="action-btn" id="settingsBtn" title="Configurações">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.63,9.07,2.68,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.04,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>
      <button class="action-btn close" id="quitBtn" title="Fechar">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const notch = document.getElementById('notch');
    const statusLabel = document.getElementById('statusLabel');
    const statusTimer = document.getElementById('statusTimer');
    const settingsBtn = document.getElementById('settingsBtn');
    const quitBtn = document.getElementById('quitBtn');

    const states = {
      idle:       { label: 'Pronto',      showTimer: false },
      listening:  { label: 'Ouvindo',     showTimer: true  },
      processing: { label: 'Processando', showTimer: false },
      typing:     { label: 'Digitado',   showTimer: false },
      error:      { label: 'Erro',        showTimer: false },
    };

    let listenStart = 0;
    let timerId = null;

    function formatMs(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function startTimer() {
      stopTimer();
      listenStart = Date.now();
      statusTimer.textContent = '00:00';
      timerId = setInterval(() => {
        statusTimer.textContent = formatMs(Date.now() - listenStart);
      }, 500);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function setState(state, message) {
      const cfg = states[state] || states.idle;
      notch.className = state;
      statusLabel.textContent = message || cfg.label;
      statusTimer.style.display = cfg.showTimer ? 'block' : 'none';

      if (state === 'listening') {
        startTimer();
      } else {
        stopTimer();
      }
    }

    // Initialize
    setState('idle');

    // Wire up action buttons
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      window.falaiAPI?.openSettings?.();
    });

    quitBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      window.falaiAPI?.quitApp?.();
    });

    // Listen for state changes from main process
    if (window.falaiAPI?.onNotchState) {
      window.falaiAPI.onNotchState((state, message) => setState(state, message));
    }
  </script>
</body>
</html>
